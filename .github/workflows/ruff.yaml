name: Linting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check for logic and style errors
        uses: astral-sh/ruff-action@v1
        with:
          args: "check"
      - name: Check formatting
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check"
